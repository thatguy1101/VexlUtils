name: VexlUtils
version: '${project.version}'
main: mc.mod.vexlUtils.VexlUtils
api-version: '1.21'
author: Max
description: All-in-one utility plugin for VEXL SMP - vaults, sign shops, door locks/sync, disguises, and player warps.

softdepend: [Vault, CMI]

commands:
  vexl:
    description: VexlUtils command hub
    usage: /vexl <vault|shop|warp|disguise|undisguise|maintenance|admin>
    aliases: [v]
  pv:
    description: Quick-open a personal vault
    usage: /pv [number]
  disguise:
    description: Disguise as a mob
    usage: /disguise <mob> [player]
  undisguise:
    description: Remove your disguise
    usage: /undisguise
  playerwarp:
    description: Teleport to a public player warp
    usage: /playerwarp <name>
    aliases: [pwarp, pw]
  va:
    description: Open the VexlUtils admin panel
    usage: /va
    aliases: [vadmin]

permissions:
  # ---- vaults ----
  vexlutils.vault.use:
    description: Base access to vaults (grants the configured default-vaults count)
    default: true
  vexlutils.vault.amount.10:
    description: "Example tier - grant a node like vexlutils.vault.amount.<n> to set someone's max vault to <n>"
    default: false
  vexlutils.vault.*:
    description: Full vault range up to the configured hard cap, bypasses amount nodes
    default: op
  vexlutils.vault.admin:
    description: Open and edit any player's vaults
    default: op

  # ---- sign shops ----
  vexlutils.shop.create:
    description: Create sign shops
    default: op
  vexlutils.shop.use:
    description: Use (buy/sell at) sign shops
    default: true
  vexlutils.shop.edit:
    description: Shift-click your own shop sign to edit it, punch it to set its item
    default: true
  vexlutils.shop.edit.others:
    description: Edit or set the item on shop signs you don't own
    default: op
  vexlutils.shop.remove:
    description: Break your own shop sign to remove it cleanly
    default: true

  # ---- doors / locks ----
  # A blank sign on a door auto-locks it [Private]; shift-right-click (owner) toggles [Public].
  vexlutils.lock.create:
    description: Auto-protect doors with a blank sign ([Private])
    default: true
  vexlutils.lock.use:
    description: Open doors via lock signs (public ones, or your own)
    default: true
  vexlutils.lock.bypass:
    description: Open any [Private] door regardless of ownership
    default: op

  # ---- disguise ----
  vexlutils.disguise:
    description: Disguise yourself as any mob
    default: op
  vexlutils.disguise.others:
    description: Disguise other players
    default: op

  # ---- player warps ----
  vexlutils.warp.create:
    description: Place [Warp] signs to create a personal warp
    default: true
  vexlutils.warp.use:
    description: Use /playerwarp (or /pwarp, /pw) and public warp signs
    default: true
  vexlutils.warp.admin:
    description: Teleport to or remove any warp regardless of owner/public status
    default: op
  vexlutils.warp.multiple:
    description: Create more than one warp (default limit is one per player)
    default: op

  # ---- admin panel ----
  vexlutils.admin:
    description: Access /va (or /vadmin) and /vexl admin - the full admin panel
    default: op

  # ---- maintenance mode ----
  vexlutils.maintenance.bypass:
    description: Join the server while maintenance mode is enabled
    default: op
  vexlutils.maintenance.admin:
    description: Toggle maintenance mode via /vexl maintenance or the admin panel
    default: op

  # ---- chat management ----
  vexlutils.chat.bypass:
    description: Bypass all chat moderation (swear filter, spam, caps, repeat)
    default: op
  vexlutils.chat.swear.bypass:
    description: Bypass the swear filter
    default: op
  vexlutils.chat.spam.bypass:
    description: Bypass the spam cooldown
    default: op
  vexlutils.chat.repeat.bypass:
    description: Bypass repeat-message blocking
    default: op
  vexlutils.chat.caps.bypass:
    description: Bypass the caps limiter
    default: op

  # ---- jukebox ----
  vexlutils.jukebox.use:
    description: Use the jukebox disc-picker GUI (right-click a jukebox)
    default: true
